<div class="main">


<div class="topbar">

<span>Manager Dashboard</span>

<span id="time"></span>

</div>



<div class="cards">

<div class="card">
<h3>Total Workers</h3>
<p>25</p>
</div>

<div class="card safe">
<h3>Safe</h3>
<p>20</p>
</div>

<div class="card danger">
<h3>Danger</h3>
<p>5</p>
</div>

</div>


</div>


<script>

function showTime(){

let d = new Date();

document.getElementById("time").innerHTML =
d.toLocaleTimeString();

}

setInterval(showTime,1000);

</script>
